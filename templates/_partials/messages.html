{% if messages %}
    <div class="mb-4 space-y-2">
        {% for m in messages %}
            <div class="rounded border px-3 py-2 text-sm
                {% if m.tags == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-900
                {% elif m.tags == 'error' %}border-red-200 bg-red-50 text-red-800
                {% elif m.tags == 'warning' %}border-amber-200 bg-amber-50 text-amber-900
                {% else %}border-slate-200 bg-slate-50 text-slate-700{% endif %}">
                {{ m }}
            </div>
        {% endfor %}
    </div>
{% endif %}
