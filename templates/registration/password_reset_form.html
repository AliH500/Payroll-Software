{% extends "base.html" %}
{% block title %}Reset password · Payroll{% endblock %}

{% block content_anon %}
<div class="rounded-lg border border-slate-200 bg-white p-8 shadow-sm">
    <h1 class="text-xl font-semibold text-slate-900">Reset password</h1>
    <p class="mt-1 text-sm text-slate-500">Enter your account email and we'll send a reset link.</p>
    <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        <div>
            <label for="id_email" class="block text-sm font-medium text-slate-700">Email</label>
            <input id="id_email" type="email" name="email" autocomplete="email" required
                   class="mt-1 w-full rounded border border-slate-300 px-3 py-2 shadow-sm">
        </div>
        <button type="submit" class="w-full rounded bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800">Send reset link</button>
    </form>
</div>
{% endblock %}
