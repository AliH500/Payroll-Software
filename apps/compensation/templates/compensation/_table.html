{% if items %}
<div class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
        <thead class="bg-slate-50">
            <tr class="text-left text-xs font-semibold uppercase tracking-wider text-slate-500">
                <th class="px-4 py-3">Employee</th>
                <th class="px-4 py-3">Period</th>
                <th class="px-4 py-3">Description</th>
                <th class="px-4 py-3">Amount</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
            {% for it in items %}
            <tr class="hover:bg-slate-50">
                <td class="px-4 py-2 font-medium text-slate-900">{{ it.employee.full_name }}</td>
                <td class="px-4 py-2 text-slate-600">{{ it.period.label }}</td>
                <td class="px-4 py-2 text-slate-700">{{ it.description }}</td>
                <td class="px-4 py-2 tabular-nums">{{ it.amount_money.format }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<p class="rounded-lg border border-dashed border-slate-300 bg-white p-4 text-sm text-slate-500">No {{ kind }}s recorded.</p>
{% endif %}
