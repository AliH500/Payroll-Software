{% extends "base.html" %}
{% block title %}Remove employee · {{ request.tenant.name }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
    <div class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-lg font-semibold text-slate-900">Remove this employee?</h1>
        <p class="mt-2 text-sm text-slate-600">You're about to delete <strong>{{ object.full_name }}</strong>. This cannot be undone.</p>
        <form method="post" class="mt-6 flex gap-3">
            {% csrf_token %}
            <button type="submit" class="rounded bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700">Yes, remove</button>
            <a href="{% url 'employees:list' %}" class="rounded border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
