services:
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: payroll-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payroll}
      POSTGRES_USER: ${POSTGRES_USER:-payroll}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payroll}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payroll}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
